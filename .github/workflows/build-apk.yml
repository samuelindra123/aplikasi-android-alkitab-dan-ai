name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Membuat file .env langsung di dalam folder alkitab-ai
      - name: Create .env File
        run: |
          echo "GEMINI_API_KEY=\"${{ secrets.GEMINI_API_KEY }}\"" > alkitab-ai/.env
          echo "OPENROUTER_API_KEY=\"${{ secrets.OPENROUTER_API_KEY }}\"" >> alkitab-ai/.env

      - name: Make Gradlew Executable
        working-directory: alkitab-ai
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: alkitab-ai
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alkitab-AI-Debug-APK
          path: alkitab-ai/app/build/outputs/apk/debug/app-debug.apk
